<div>
    <h3 class="text-sm font-semibold text-gray-700 mb-3 uppercase tracking-wide">Recently Explored</h3>
    @if (records().length === 0) {
    <p class="text-gray-400 text-sm">No explorations yet. Click a country to start!</p>
    } @else {
    <ol class="space-y-2">
        @for (record of records(); track record._id) {
        <li class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
            <div class="min-w-0 flex-1">
                <p class="text-sm font-medium text-gray-800">{{ record.country }}</p>
                <p class="text-xs text-gray-500 truncate">{{ record.trackName }} — {{ record.artist }}</p>
                <p class="text-xs text-gray-400">{{ record.exploredAt | date:'medium' }}</p>
            </div>
            <button (click)="delete(record._id!)" class="text-gray-300 hover:text-red-400 text-sm ml-3 shrink-0"
                aria-label="Delete record">
                ✕
            </button>
        </li>
        }
    </ol>
    }
</div>
