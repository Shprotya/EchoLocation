<div>
    <h3 class="text-lg font-bold mb-3">Exploration History</h3>
    @if (records().length === 0) {
    <p class="text-gray-400 text-sm">No explorations yet. Click a country to start!</p>
    } @else {
    <ol class="space-y-2">
        @for (record of records(); track record._id) {
        <li class="bg-gray-800 rounded p-3 text-sm">
            <div class="flex justify-between items-start">
                <div>
                    <p class="font-medium">{{ record.country }}</p>
                    <p class="text-gray-400">{{ record.trackName }}</p>
                    <p class="text-gray-500 text-xs">{{ record.artist }}</p>
                    <p class="text-gray-500 text-xs">{{ record.exploredAt | date:'medium' }}</p>
                </div>
                <button (click)="delete(record._id!)" class="text-red-400 hover:text-red-300 text-xs ml-2">
                    ✕
                </button>
            </div>
        </li>
        }
    </ol>
    }
</div>
