<div class="w-80 h-screen bg-gray-900 text-white p-4 overflow-y-auto">
    <app-search-bar />

    <!-- Tabs -->
    <div class="flex mb-4 border-b border-gray-700">
        <button (click)="activeTab.set('tracks')" [class]="activeTab() === 'tracks'
        ? 'flex-1 py-2 text-sm font-medium text-white border-b-2 border-red-500'
        : 'flex-1 py-2 text-sm font-medium text-gray-400 hover:text-white'">
            Top Tracks
        </button>
        <button (click)="activeTab.set('stats')" [class]="activeTab() === 'stats'
        ? 'flex-1 py-2 text-sm font-medium text-white border-b-2 border-red-500'
        : 'flex-1 py-2 text-sm font-medium text-gray-400 hover:text-white'">
            History
        </button>
    </div>

    <!-- Tracks tab -->
    @if (activeTab() === 'tracks') {
    @if (selectedCountry()) {
    <h2 class="text-xl font-bold mb-4">{{ selectedCountry() }}</h2>
    @if (loading()) {
    <p class="text-gray-400">Loading tracks...</p>
    } @else if (error()) {
    <p class="text-red-400">{{ error() }}</p>
    } @else {
    <app-track-list [tracks]="tracks()" />
    }
    } @else {
    <p class="text-gray-400 mt-8 text-center">Click a country to explore its music</p>
    }
    }

    <!-- Stats tab -->
    @if (activeTab() === 'stats') {
    <app-stats />
    }
</div>
