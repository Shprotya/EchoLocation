<div class="flex gap-2 mb-1">
    <input type="text" [ngModel]="query()" (ngModelChange)="query.set($event); isEmpty.set(false)"
        (keyup.enter)="onSearch()" placeholder="Search country..."
        class="flex-1 bg-gray-800 text-white rounded px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-red-400" />
    <button (click)="onSearch()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded text-sm">
        Search
    </button>
</div>
@if (isEmpty()) {
<p class="text-red-400 text-xs mb-3">Please enter a country name.</p>
} @else if (countryNotFound()) {
<p class="text-red-400 text-xs mb-3">Country not found. Try a different name.</p>
}
